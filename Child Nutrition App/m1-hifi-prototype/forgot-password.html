<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Forgot password — Suppa</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,600&family=Inter:wght@400;500;600&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <div class="app-frame">
      <a class="btn btn--ghost" href="auth.html?mode=login" style="margin: -0.5rem 0 1rem; align-self: flex-start"
        >Back</a
      >
      <main id="forgot-step-form">
        <p class="wordmark wordmark--auth" lang="en">Suppa</p>
        <h1 class="title">Forgot password</h1>
        <p class="body-muted">We’ll email you a link to reset your password.</p>
        <form class="auth-form" style="margin-top: 1.5rem" id="forgot-form">
          <div class="field">
            <label for="email">Email</label>
            <input id="email" name="email" type="email" autocomplete="email" required />
          </div>
          <button type="submit" class="btn btn--primary">Send reset link</button>
        </form>
      </main>
      <main id="forgot-step-sent" hidden>
        <p class="wordmark wordmark--auth" lang="en">Suppa</p>
        <h1 class="title">Check your email</h1>
        <p class="body-muted">
          If that email has a Suppa account, we sent a reset link. The link opens a page to choose a new password.
        </p>
        <p class="body-muted" style="margin-top: 1rem">
          <a href="reset-password.html?token=demo">Open reset page (demo link)</a>
        </p>
        <p style="margin-top: 1.5rem">
          <a class="btn btn--ghost" href="auth.html?mode=login">Back to log in</a>
        </p>
      </main>
    </div>
    <script>
      (function () {
        var form = document.getElementById("forgot-form");
        var stepForm = document.getElementById("forgot-step-form");
        var stepSent = document.getElementById("forgot-step-sent");
        if (form && stepForm && stepSent) {
          form.addEventListener("submit", function (e) {
            e.preventDefault();
            stepForm.hidden = true;
            stepSent.hidden = false;
          });
        }
      })();
    </script>
    <script src="app.js"></script>
  </body>
</html>
