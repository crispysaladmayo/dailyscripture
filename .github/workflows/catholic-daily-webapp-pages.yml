# Deploy Catholic Daily static webapp (folder with spaces → GitHub Pages).
# After first push: Repo → Settings → Pages → Build: GitHub Actions.
name: Deploy Catholic Daily webapp

on:
  push:
    branches: [main]
    paths:
      - "Catholic Daily App/webapp/**"
      - ".github/workflows/catholic-daily-webapp-pages.yml"
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages-catholic-daily-webapp
  cancel-in-progress: true

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/configure-pages@v5
      - uses: actions/upload-pages-artifact@v3
        with:
          path: "Catholic Daily App/webapp"
      - id: deployment
        uses: actions/deploy-pages@v4
