name: Catholic Daily App — build debug APK

on:
  workflow_dispatch:
  push:
    paths:
      - "Catholic Daily App/android/**"
      - ".github/workflows/android-build-apk.yml"
  pull_request:
    paths:
      - "Catholic Daily App/android/**"

jobs:
  apk:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: Catholic Daily App/android

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      # Platform 35 required by androidx.core:core-ktx:1.15+. Omit explicit build-tools;35.0.0 — that
      # package is often missing on runners; AGP downloads the correct build-tools during the build.
      - name: Set up Android SDK
        uses: android-actions/setup-android@v3
        with:
          packages: >-
            platform-tools
            platforms;android-35

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Assemble debug APK
        run: ./gradlew :app:assembleDebug --no-daemon --stacktrace

      - name: Upload debug APK
        uses: actions/upload-artifact@v4
        with:
          name: catholic-daily-app-debug
          path: Catholic Daily App/android/app/build/outputs/apk/debug/app-debug.apk
          if-no-files-found: error
